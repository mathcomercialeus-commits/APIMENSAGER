services:
  - type: web
    runtime: python
    name: atendecrm-preview-api
    plan: free
    region: virginia
    rootDir: apps/api
    buildCommand: pip install --upgrade pip && pip install .
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: preview
      - key: DATABASE_URL
        fromDatabase:
          name: atendecrm-preview-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: atendecrm-preview-kv
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: atendecrm-preview-kv
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: atendecrm-preview-kv
          property: connectionString
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "true"
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: BACKEND_CORS_ORIGINS
        value: https://atendecrm-preview-web.onrender.com
      - key: SEED_SUPERADMIN
        value: "true"
      - key: SUPERADMIN_LOGIN
        value: admin
      - key: SUPERADMIN_EMAIL
        value: admin@plataforma.local
      - key: SUPERADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATA_ENCRYPTION_SECRET
        generateValue: true
      - key: RUNTIME_AGENT_TOKEN
        generateValue: true
      - key: META_GLOBAL_APP_SECRET
        sync: false
      - key: META_GLOBAL_VERIFY_TOKEN
        sync: false
      - key: ASAAS_API_KEY
        sync: false
      - key: ASAAS_WEBHOOK_AUTH_TOKEN
        sync: false

  - type: web
    runtime: node
    name: atendecrm-preview-web
    plan: free
    region: virginia
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://atendecrm-preview-api.onrender.com/api/v1

  - type: keyvalue
    name: atendecrm-preview-kv
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: preview

databases:
  - name: atendecrm-preview-db
    plan: free
    region: virginia
    databaseName: atendecrm_preview
    postgresMajorVersion: "18"
