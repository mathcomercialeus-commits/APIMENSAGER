services:
  - type: web
    runtime: node
    name: avaliacao-entregadores
    plan: free
    buildCommand: echo build-skip
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        generateValue: true
      - key: WORKER_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: MAX_UPLOAD_MB
        value: "20"
